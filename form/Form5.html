<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form novalidate target="_blank">
        <div>
            <label>Search</label>
            <input type="search" name="search" placeholder=" Enter A Search Word" autofocus>
        </div>
        <br>

        <div>
            <label>File</label>
            <input type="file" name="File">
        </div>
        <br>

        <div>
            <label>Url</label>
            <input type="url" name="Url" required>
        </div>
        <br>

        <div>
            <label>Date</label>
            <input type="date" name="Date" value="1982-10-25">
        </div>
        <br>

        <div>
            <label>Month</label>
            <input type="month" name="Month" value="1982-10">
        </div>
        <br>
        
        <input type="submit" value="Save">
        <input type="reset" value="Empty">
    </form>
</body>
</html>
