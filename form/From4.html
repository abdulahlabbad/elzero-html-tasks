<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="" method="get">
        Skills :
        <br>
        <div>
            <input type="checkbox" name="Skills" id="Problem Solving" checked>
            <label for="Problem Solving">Problem Solving</label>
        </div>
        <br>

        <div>
            <input type="checkbox" name="Skills" id="Logical Thinking">
            <label for="Logical Thinking">Logical Thinking</label>
        </div>
        <br>

        <div>
            <input type="checkbox" name="Skills" id="Advanced Search">
            <label for="Advanced Search">Advanced Search</label>
        </div>
        <br>

        <div>
            <input type="checkbox" name="Skills" id="Analysis">
            <label for="Analysis">Analysis</label>
        </div>
        <br>

        <div>
            <input type="checkbox" name="Skills" id="Planning">
            <label for="Planning">Planning</label>
        </div>
        <br>
        <hr>


        Job :
        <br>
        <div>
            <input type="radio" name="Job" id="Front-End Developer" checked>
            <label for="Front-End Developer">Front-End Developer</label>
        </div>
        <br>

        <div>
            <input type="radio" name="Job" id="Back-End Developer">
            <label for="Back-End Developer">Back-End Developer</label>
        </div>
        <br>

        <div>
            <input type="radio" name="Job" id="Business Analyst">
            <label for="Business Analyst">Business Analyst</label>
        </div>
        <br>

        <div>
            <input type="radio" name="Job" id="Project Manager">
            <label for="Project Manager">Project Manager</label>
        </div>
        <br>

        <div>
            <input type="radio" name="Job6" id="Scrum Master">
            <label for="Scrum Master">Scrum Master</label>
        </div>
        <br>
        <hr>

        <label for="">Choose Book:</label>
        <select name="PHP" id="PHP">
            <optgroup label="PHP">
                <option value="v5.0" selected>v5.0</option>
                <option value="v9.0">v9.0</option>
                <option value="v8.0">v8.0</option>
            </optgroup>
            
            <optgroup label="Python">
                <option value="v2.0">v2.0</option>
                <option value="v3.0">v3.0</option>
                <option value="v3.9">v3.9</option>
            </optgroup>
        </select>
        <br>
        <br>
        <hr>

        <textarea name="area" id="" placeholder="Write Here Why You Want To Learn Programming" rows="10" cols="40"></textarea>
        <br>
        
        <input type="submit" value="Send">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
